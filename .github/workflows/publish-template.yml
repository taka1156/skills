name: Publish template branch

on:
  push:
    branches:
      - master

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Create dist branch with selected files only
        run: |
          # 抽出対象ファイル
          FILES=(
            ".github/skills/chat-code-review/SKILL.md"
            ".github/skills/git-hook-code-review/SKILL.md"
            "copilot-review/.gitkeep"
            "lefthook.yml"
            "review-check.sh"
          )

          # 一時ディレクトリに対象ファイルをコピー
          TMPDIR=$(mktemp -d)
          for f in "${FILES[@]}"; do
            mkdir -p "$TMPDIR/$(dirname "$f")"
            cp "$f" "$TMPDIR/$f"
          done

          # orphan ブランチを新規作成
          git checkout --orphan template
          git rm -rf . --quiet

          # 一時ディレクトリからファイルを復元
          for f in "${FILES[@]}"; do
            mkdir -p "$(dirname "$f")"
            cp "$TMPDIR/$f" "$f"
          done

          rm -rf "$TMPDIR"

          # コミット & 強制 push
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add "${FILES[@]}"
          git commit -m "chore: publish template from ${GITHUB_SHA::7}"
          git push origin template --force
